<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ثبت نوبت</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* ── tokens ── */
  :root {
    --bg:        #f0f4f8;
    --card:      #ffffff;
    --teal:      #0a7c6e;
    --teal-lt:   #e6f4f2;
    --teal-mid:  #0d9e8c;
    --text:      #1a2733;
    --muted:     #7a8fa0;
    --border:    #d8e4ec;
    --drum-h:    52px;
    --drum-vis:  3;   /* تعداد آیتم مرئی */
    --radius:    16px;
    --shadow:    0 4px 24px rgba(10,124,110,.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── header ── */
  .header {
    background: var(--teal);
    color: #fff;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header svg { flex-shrink: 0; }
  .header h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
  .header p  { font-size: 12px; opacity: .75; margin-top: 2px; }

  /* ── steps ── */
  .steps {
    display: flex;
    gap: 0;
    background: var(--teal);
    padding: 0 20px 16px;
    justify-content: center;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
  }
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 14px; right: calc(-50% + 14px);
    width: calc(100% - 28px);
    height: 2px;
    background: rgba(255,255,255,.3);
    z-index: 0;
  }
  .step.done::after  { background: rgba(255,255,255,.7); }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    border: 2px solid rgba(255,255,255,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    position: relative; z-index: 1;
    transition: background .25s, border-color .25s;
  }
  .step.active .step-dot { background: #fff; color: var(--teal); border-color: #fff; }
  .step.done   .step-dot { background: rgba(255,255,255,.5); border-color: rgba(255,255,255,.7); }
  .step-label { font-size: 10px; color: rgba(255,255,255,.7); margin-top: 4px; }
  .step.active .step-label { color: #fff; font-weight: 600; }

  /* ── body scroll ── */
  .body { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

  /* ── card ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-title {
    font-size: 13px; font-weight: 700; color: var(--muted);
    padding: 14px 16px 0;
    text-transform: uppercase; letter-spacing: .05em;
  }

  /* ── doctor picker ── */
  .doctor-grid { display: flex; flex-direction: column; gap: 0; }
  .doctor-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 16px;
    border: none; background: none; cursor: pointer; width: 100%;
    text-align: right; border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .doctor-btn:last-child { border-bottom: none; }
  .doctor-btn:active { background: var(--teal-lt); }
  .doctor-btn.selected { background: var(--teal-lt); }
  .doctor-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--teal-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    border: 2px solid transparent;
    transition: border-color .2s;
  }
  .doctor-btn.selected .doctor-avatar { border-color: var(--teal); }
  .doctor-info { flex: 1; }
  .doctor-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .doctor-spec { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .check-icon { width: 22px; height: 22px; color: var(--teal); opacity: 0; transition: opacity .2s; }
  .doctor-btn.selected .check-icon { opacity: 1; }

  /* ── drum picker ── */
  .drum-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px 16px;
    align-items: flex-start;
  }
  .drum-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .drum-col-label { font-size: 11px; color: var(--muted); font-weight: 600; }

  /* دکمه‌های فلش بالا/پایین */
  .drum-arrow {
    width: 100%;
    height: 30px;
    display: flex; align-items: center; justify-content: center;
    background: var(--teal-lt);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--teal);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s, transform .08s;
  }
  .drum-arrow:active { background: var(--teal); color: #fff; transform: scale(.95); }
  .drum-arrow svg { width: 18px; height: 18px; }

  .drum-wrap {
    position: relative;
    width: 100%;
    height: calc(var(--drum-h) * var(--drum-vis));
    overflow: hidden;
    border-radius: 12px;
    background: #f7fafb;
    border: 1.5px solid var(--border);
    cursor: grab;
    user-select: none;
    touch-action: pan-y;
  }
  .drum-wrap:active { cursor: grabbing; }

  /* خط انتخاب */
  .drum-wrap::before,
  .drum-wrap::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 1.5px;
    background: var(--teal);
    z-index: 2;
    pointer-events: none;
  }
  .drum-wrap::before { top: calc(var(--drum-h) * 1); }
  .drum-wrap::after  { top: calc(var(--drum-h) * 2); }

  /* fade بالا/پایین */
  .drum-fade {
    position: absolute;
    left: 0; right: 0; height: var(--drum-h);
    z-index: 1; pointer-events: none;
  }
  .drum-fade.top    { top: 0;    background: linear-gradient(to bottom, rgba(247,250,251,.96), transparent); }
  .drum-fade.bottom { bottom: 0; background: linear-gradient(to top,   rgba(247,250,251,.96), transparent); }

  .drum-list {
    position: absolute;
    top: 0; left: 0; right: 0;
    transition: transform .18s cubic-bezier(.25,.46,.45,.94);
    will-change: transform;
  }
  .drum-item {
    height: var(--drum-h);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 500;
    color: var(--muted);
    transition: color .15s, font-size .15s, font-weight .15s;
  }
  .drum-item.selected {
    color: var(--teal);
    font-size: 20px;
    font-weight: 700;
  }

  /* ── reason grid ── */
  .reason-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 12px 16px 16px;
  }
  .reason-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 14px 8px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: none; cursor: pointer;
    font-size: 12px; color: var(--text);
    transition: border-color .15s, background .15s;
    line-height: 1.3; text-align: center;
  }
  .reason-btn .emoji { font-size: 24px; }
  .reason-btn:active  { background: var(--teal-lt); }
  .reason-btn.selected {
    border-color: var(--teal);
    background: var(--teal-lt);
    color: var(--teal);
    font-weight: 600;
  }
  .reason-btn.full { grid-column: span 2; flex-direction: row; padding: 12px 16px; }

  /* ── summary card ── */
  .summary { display: flex; flex-direction: column; gap: 0; }
  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: var(--muted); font-size: 13px; }
  .summary-value { font-weight: 600; color: var(--text); }

  /* ── nav buttons ── */
  .nav { display: flex; gap: 10px; padding: 0 16px 20px; }
  .btn-back {
    flex: 0 0 80px; height: 50px;
    border: 1.5px solid var(--border); border-radius: 14px;
    background: var(--card); color: var(--text);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .btn-next {
    flex: 1; height: 50px;
    background: var(--teal); color: #fff;
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn-next:active { transform: scale(.97); }
  .btn-next:disabled { background: var(--muted); cursor: default; }
  .btn-next.confirm { background: #0a6b40; }

  /* ── page visibility ── */
  .page { display: none; }
  .page.active { display: contents; }

  /* ── toast ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a2733; color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; opacity: 0;
    transition: opacity .3s, transform .3s;
    pointer-events: none; white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
/* ══════════════════════════════════════════════
   TELEGRAM WEB APP INIT
══════════════════════════════════════════════ */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
}

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const state = {
  doctor: null, doctorLabel: null,
  year: null, month: null, day: null, time: null,
  dateDisplay: null, dateGregorian: null,
  reason: null,
};
let currentPage = 1;

/* ══════════════════════════════════════════════
   JALALI UTILS
══════════════════════════════════════════════ */
const MONTHS_FA = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور',
                   'مهر','آبان','آذر','دی','بهمن','اسفند'];
const TO_FA = s => String(s).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
const FROM_FA = s => String(s).replace(/[۰-۹]/g, d => d.charCodeAt(0) - '۰'.charCodeAt(0));

/* تبدیل جلالی ↔ میلادی — الگوریتم بورکوفسکی (Borkowski)، همان الگوریتمی که
   تقویم رسمی ایران و کتابخانه‌ی معروف jalaali-js استفاده می‌کنند.
   با تاریخ‌های رسمی نوروز ۱۴۰۴ و ۱۴۰۵ تطبیق و تست شده است. */
function _div(a, b) { return Math.trunc(a / b); }
function _mod(a, b) { return a - Math.trunc(a / b) * b; }

const _JALALI_BREAKS = [-61, 9, 38, 199, 426, 686, 756, 818, 1111, 1181,
                         1210, 1635, 2060, 2097, 2192, 2262, 2324, 2394, 2456, 3178];

function _jalCalCore(jy) {
  const gy = jy + 621;
  let leapJ = -14;
  let jp = _JALALI_BREAKS[0];
  let jm = 0, jump = 0;
  for (let i = 1; i < _JALALI_BREAKS.length; i++) {
    jm = _JALALI_BREAKS[i];
    jump = jm - jp;
    if (jy < jm) break;
    leapJ = leapJ + _div(jump, 33) * 8 + _div(_mod(jump, 33), 4);
    jp = jm;
  }
  const n = jy - jp;
  leapJ = leapJ + _div(n, 33) * 8 + _div(_mod(n, 33) + 3, 4);
  if (_mod(jump, 33) === 4 && jump - n === 4) leapJ += 1;
  const leapG = _div(gy, 4) - _div((_div(gy, 100) + 1) * 3, 4) - 150;
  const march = 20 + leapJ - leapG;
  return { gy, march, jump, n };
}

function _leapFromCycle(jump, n) {
  let adjusted = n;
  if (jump - n < 6) adjusted = n - jump + _div(jump + 4, 33) * 33;
  let leap = _mod(_mod(adjusted + 1, 33) - 1, 4);
  if (leap === -1) leap = 4;
  return leap;
}

function _jalCal(jy) {
  const { gy, march, jump, n } = _jalCalCore(jy);
  return { leap: _leapFromCycle(jump, n), gy, march };
}

function _g2d(gy, gm, gd) {
  let d = _div((gy + _div(gm - 8, 6) + 100100) * 1461, 4) + _div(153 * _mod(gm + 9, 12) + 2, 5) + gd - 34840408;
  d = d - _div(_div(gy + 100100 + _div(gm - 8, 6), 100) * 3, 4) + 752;
  return d;
}

function _d2g(jdn) {
  let j = 4 * jdn + 139361631;
  j = j + _div(_div(4 * jdn + 183187720, 146097) * 3, 4) * 4 - 3908;
  const i = _div(_mod(j, 1461), 4) * 5 + 308;
  const gd = _div(_mod(i, 153), 5) + 1;
  const gm = _mod(_div(i, 153), 12) + 1;
  const gy = _div(j, 1461) - 100100 + _div(8 - gm, 6);
  return { gy, gm, gd };
}

function _j2d(jy, jm, jd) {
  const r = _jalCal(jy);
  return _g2d(r.gy, 3, r.march) + (jm - 1) * 31 - _div(jm, 7) * (jm - 7) + jd - 1;
}

function _d2j(jdn) {
  const gy = _d2g(jdn).gy;
  let jy = gy - 621;
  const r = _jalCal(jy);
  const jdn1f = _g2d(gy, 3, r.march);
  let k = jdn - jdn1f;
  if (k >= 0) {
    if (k <= 185) return { jy, jm: 1 + _div(k, 31), jd: _mod(k, 31) + 1 };
    k -= 186;
  } else {
    jy -= 1;
    k += 179;
    if (r.leap === 1) k += 1;
  }
  return { jy, jm: 7 + _div(k, 30), jd: _mod(k, 30) + 1 };
}

function jalaliToGregorian(jy, jm, jd) {
  const g = _d2g(_j2d(jy, jm, jd));
  return [g.gy, g.gm, g.gd];
}

function gregorianToJalali(gy, gm, gd) {
  const j = _d2j(_g2d(gy, gm, gd));
  return [j.jy, j.jm, j.jd];
}

function isLeapJalaliYear(jy) {
  return _jalCal(jy).leap === 0;
}

function daysInJalaliMonth(jy, jm) {
  if (jm <= 6) return 31;
  if (jm <= 11) return 30;
  return isLeapJalaliYear(jy) ? 30 : 29;
}

function todayJalali() {
  const now = new Date();
  // تقریب ساده برای تهران (UTC+3:30)
  const tehran = new Date(now.getTime() + (3.5 * 60 * 60 * 1000));
  const gy = tehran.getUTCFullYear(), gm = tehran.getUTCMonth() + 1, gd = tehran.getUTCDate();
  return gregorianToJalali(gy, gm, gd);
}

/* ══════════════════════════════════════════════
   DRUM PICKER
══════════════════════════════════════════════ */
const DRUM_H = 52; // px — باید با --drum-h هماهنگ باشه

class Drum {
  constructor(wrapId, listId, items, initial = 0, onChange) {
    this.wrap    = document.getElementById(wrapId);
    this.list    = document.getElementById(listId);
    this.items   = items;
    this.idx     = initial;
    this.onChange = onChange;
    this._touch  = null;
    this._startY = 0;
    this._startIdx = 0;
    this._vel = 0;
    this._lastY = 0;
    this._lastT = 0;
    this._animFrame = null;

    this._render();
    this._attach();
  }

  setItems(items, idx = 0) {
    this.items = items;
    this.idx   = Math.min(idx, items.length - 1);
    this._render();
  }

  step(dir) {
    if (this._animFrame) cancelAnimationFrame(this._animFrame);
    this._setY(this.idx + dir, true);
  }

  _render() {
    if (this.items.length === 0) {
      this.list.innerHTML = `<div class="drum-item" style="color:var(--muted);font-size:13px;">نوبتی نیست</div>`;
      this.list.style.transition = 'none';
      this.list.style.transform = `translateY(${DRUM_H}px)`;
      return;
    }
    this.list.innerHTML = this.items.map((v, i) =>
      `<div class="drum-item${i === this.idx ? ' selected' : ''}">${v}</div>`
    ).join('');
    this._setY(this.idx, false);
  }

  _setY(idx, animate = true) {
    if (this.items.length === 0) return;
    this.idx = Math.max(0, Math.min(idx, this.items.length - 1));
    const offset = DRUM_H - this.idx * DRUM_H; // یه آیتم از بالا offset
    this.list.style.transition = animate ? 'transform .18s cubic-bezier(.25,.46,.45,.94)' : 'none';
    this.list.style.transform  = `translateY(${offset}px)`;
    // آپدیت کلاس selected
    [...this.list.children].forEach((el, i) => {
      el.classList.toggle('selected', i === this.idx);
    });
    this.onChange?.(this.idx, this.items[this.idx]);
  }

  _attach() {
    this.wrap.addEventListener('touchstart', e => this._ts(e), {passive: false});
    this.wrap.addEventListener('touchmove',  e => this._tm(e), {passive: false});
    this.wrap.addEventListener('touchend',   e => this._te(e));
    this.wrap.addEventListener('mousedown',  e => this._ms(e));
    this.wrap.addEventListener('wheel',      e => this._wheel(e), {passive: false});
  }

  _ts(e) {
    const t = e.touches[0];
    this._startY = t.clientY; this._startIdx = this.idx;
    this._lastY = t.clientY; this._lastT = Date.now(); this._vel = 0;
    this._dragging = false;
  }
  _tm(e) {
    const t = e.touches[0];
    const now = Date.now();
    const dy = this._startY - t.clientY;
    // فقط وقتی حرکت واقعی روی درام تشخیص داده شد، صفحه را قفل می‌کنیم
    if (!this._dragging) {
      if (Math.abs(dy) < 6) return; // حرکت خیلی کوچک، هنوز اسکرول معمولی صفحه را مختل نکن
      this._dragging = true;
    }
    e.preventDefault();
    this._vel = (this._lastY - t.clientY) / (now - this._lastT + 1);
    this._lastY = t.clientY; this._lastT = now;
    const delta = Math.round(dy / DRUM_H);
    this._setY(this._startIdx + delta, false);
  }
  _te() {
    if (!this._dragging) return;
    this._dragging = false;
    // momentum
    let vel = this._vel;
    const step = () => {
      if (Math.abs(vel) < .05) { this._setY(Math.round(this.idx), true); return; }
      this._setY(this.idx + vel * 5, false);
      vel *= .85;
      this._animFrame = requestAnimationFrame(step);
    };
    if (this._animFrame) cancelAnimationFrame(this._animFrame);
    step();
  }

  _ms(e) {
    this._startY = e.clientY; this._startIdx = this.idx;
    const move = ev => {
      const delta = Math.round((this._startY - ev.clientY) / DRUM_H);
      this._setY(this._startIdx + delta, false);
    };
    const up = () => { this._setY(Math.round(this.idx), true); document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  }

  _wheel(e) {
    e.preventDefault();
    this._setY(this.idx + (e.deltaY > 0 ? 1 : -1), true);
  }
}

/* ══════════════════════════════════════════════
   INIT DRUMS
══════════════════════════════════════════════ */
let drumMonth, drumDay, drumTime;
let [todayJY, todayJM, todayJD] = todayJalali();

const WORK_START = 9, WORK_END = 20, LUNCH_S = 13, LUNCH_E = 14, DURATION = 30;

// لیست ۱۲ ماه آینده شروع‌شده از ماه جاری (چرخشی) — سال به‌صورت خودکار محاسبه می‌شود
const MONTH_CYCLE = Array.from({length: 12}, (_, i) => {
  const mIdx = (todayJM - 1 + i) % 12;      // ایندکس ماه ۰..۱۱
  const yOff = Math.floor((todayJM - 1 + i) / 12); // افزایش سال در صورت عبور از اسفند
  return { label: MONTHS_FA[mIdx], jm: mIdx + 1, yOff };
});
const MONTH_LABELS = MONTH_CYCLE.map(x => x.label);

function buildTimeSlots(isToday) {
  const slots = [];
  let h = WORK_START, m = 0;

  // اگه روز انتخاب‌شده «امروز» باشه، ساعت/دقیقه فعلی تهران رو برای فیلتر کردن اسلات‌های گذشته می‌گیریم
  let nowH = -1, nowM = -1;
  if (isToday) {
    const tehran = new Date(Date.now() + (3.5 * 60 * 60 * 1000));
    nowH = tehran.getUTCHours();
    nowM = tehran.getUTCMinutes();
  }

  while (h < WORK_END) {
    const isLunch = (h >= LUNCH_S && h < LUNCH_E);
    const isPastSlot = isToday && (h < nowH || (h === nowH && m <= nowM));
    if (!isLunch && !isPastSlot)
      slots.push(TO_FA(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`));
    m += DURATION;
    if (m >= 60) { h += Math.floor(m / 60); m %= 60; }
  }
  return slots;
}

function buildDayList(monthCycleIdx) {
  const { jm, yOff } = MONTH_CYCLE[monthCycleIdx];
  const jy = todayJY + yOff;
  const total = daysInJalaliMonth(jy, jm);
  return Array.from({length: total}, (_, i) => TO_FA(i + 1));
}

function isSelectedDayToday(monthCycleIdx, day) {
  const { yOff } = MONTH_CYCLE[monthCycleIdx];
  return yOff === 0 && monthCycleIdx === 0 && day === todayJD;
}

function initDrums() {
  const initMi = 0; // ماه جاری همیشه اول لیست است
  const initDi = todayJD - 1;
  const initIsToday = isSelectedDayToday(0, todayJD);
  const initSlots = buildTimeSlots(initIsToday);

  drumMonth = new Drum('drum-month', 'list-month', MONTH_LABELS, initMi, (i) => {
    state.monthCycleIdx = i;
    updateDayList();
    readDate();
  });

  drumDay = new Drum('drum-day', 'list-day', buildDayList(0), initDi, (i) => {
    state.day = i + 1;
    readDate();
    updateTimeList();
  });

  drumTime = new Drum('drum-time', 'list-time', initSlots, 0, (i, v) => {
    state.time = String(FROM_FA(v));
    updateNextBtn();
  });

  state.monthCycleIdx = 0;
  state.day   = todayJD;
  state.time  = initSlots[0]?.replace(/[۰-۹]/g, d => d.charCodeAt(0) - '۰'.charCodeAt(0)) || null;
  readDate();
}

function updateTimeList() {
  if (!drumTime) return;
  const mi = state.monthCycleIdx ?? 0;
  const isToday = isSelectedDayToday(mi, state.day);
  const slots = buildTimeSlots(isToday);
  drumTime.setItems(slots, 0);
  state.time = slots[0]?.replace(/[۰-۹]/g, d => d.charCodeAt(0) - '۰'.charCodeAt(0)) || null;
  updateNextBtn();
}

function updateDayList() {
  if (!drumDay) return; // درام روز هنوز ساخته نشده (در حین ساخت اولیه)
  const mi = state.monthCycleIdx ?? 0;
  const days = buildDayList(mi);
  const curDay = Math.min(state.day ?? 1, days.length) - 1;
  drumDay.setItems(days, curDay);
  state.day = curDay + 1;
  readDate();
  updateTimeList();
}

function readDate() {
  const mi = state.monthCycleIdx ?? 0;
  if (state.day == null) return;
  const { jm, yOff } = MONTH_CYCLE[mi];
  const jy = todayJY + yOff;
  state.year  = jy;
  state.month = jm;
  const [gy, gm, gd] = jalaliToGregorian(jy, jm, state.day);
  state.dateGregorian = `${gy}-${String(gm).padStart(2,'0')}-${String(gd).padStart(2,'0')}`;
  state.dateDisplay   = `${TO_FA(jy)}/${TO_FA(jm)}/${TO_FA(state.day)}`;
  // بررسی جمعه
  const d = new Date(gy, gm - 1, gd);
  state.isFriday = d.getDay() === 5;
  state.isPast   = d < new Date(new Date().toDateString());
  updateNextBtn();
}

/* ══════════════════════════════════════════════
   PAGE NAVIGATION
══════════════════════════════════════════════ */
function updateSteps(page) {
  document.querySelectorAll('.step').forEach(s => {
    const n = +s.dataset.step;
    s.classList.toggle('active', n === page);
    s.classList.toggle('done',   n < page);
  });
}

function showPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page${n}`).classList.add('active');
  document.getElementById('btnBack').style.display = n > 1 ? 'flex' : 'none';
  updateSteps(n);
  currentPage = n;
  if (n === 2 && !drumMonth) initDrums();
  if (n === 4) buildSummary();
  updateNextBtn();
  document.getElementById('mainBody').scrollTop = 0;
}

function updateNextBtn() {
  const btn = document.getElementById('btnNext');
  let ok = false;
  if (currentPage === 1) ok = !!state.doctor;
  if (currentPage === 2) {
    ok = !!state.dateGregorian && !!state.time;
    if (state.isFriday) { btn.disabled = true; btn.textContent = 'جمعه تعطیل است'; return; }
    if (state.isPast)   { btn.disabled = true; btn.textContent = 'تاریخ گذشته است'; return; }
    if (!state.time)    { btn.disabled = true; btn.textContent = 'نوبتی برای امروز باقی نمانده'; return; }
  }
  if (currentPage === 3) ok = !!state.reason;
  if (currentPage === 4) { btn.disabled = false; btn.textContent = '✅ ثبت نوبت'; btn.classList.add('confirm'); return; }
  btn.disabled = !ok;
  btn.classList.remove('confirm');
  btn.textContent = 'بعدی ←';
}

function goNext() {
  if (currentPage < 4) showPage(currentPage + 1);
  else submitBooking();
}
function goBack() {
  if (currentPage > 1) showPage(currentPage - 1);
}

/* ══════════════════════════════════════════════
   DOCTOR SELECT
══════════════════════════════════════════════ */
function selectDoctor(btn) {
  document.querySelectorAll('.doctor-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.doctor      = btn.dataset.doc;
  state.doctorLabel = btn.querySelector('.doctor-name').textContent;
  updateNextBtn();
}

/* ══════════════════════════════════════════════
   REASON SELECT
══════════════════════════════════════════════ */
function selectReason(btn) {
  document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.reason = btn.dataset.reason;
  updateNextBtn();
}

/* ══════════════════════════════════════════════
   SUMMARY
══════════════════════════════════════════════ */
function buildSummary() {
  const rows = [
    ['👨‍⚕️ پزشک',   state.doctorLabel],
    ['📅 تاریخ',   state.dateDisplay],
    ['⏰ ساعت',    TO_FA(state.time)],
    ['🦷 دلیل',    state.reason],
  ];
  document.getElementById('summaryBox').innerHTML = rows.map(([l, v]) =>
    `<div class="summary-row"><span class="summary-label">${l}</span><span class="summary-value">${v}</span></div>`
  ).join('');
}

/* ══════════════════════════════════════════════
   SUBMIT
══════════════════════════════════════════════ */
function submitBooking() {
  const payload = {
    doctor:       state.doctor,
    doctorLabel:  state.doctorLabel,
    date:         state.dateGregorian,
    dateDisplay:  state.dateDisplay,
    time:         state.time,
    reason:       state.reason,
  };

  // بررسی کامل بودن داده‌ها
  if (!payload.doctor || !payload.date || !payload.time || !payload.reason) {
    showToast('اطلاعات ناقص است. لطفاً دوباره تلاش کنید.');
    return;
  }

  const dataStr = JSON.stringify(payload);

  try {
    if (tg && tg.sendData) {
      tg.sendData(dataStr);
    } else {
      alert('داده ارسال شد:\n' + dataStr);
    }
  } catch(e) {
    showToast('خطا در ارسال: ' + e.message);
  }
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── init ── */
showPage(1);
</script>
